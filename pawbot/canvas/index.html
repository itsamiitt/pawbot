<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawBot Canvas</title>
    <style>
        :root {
            --bg: #0e1525;
            --panel: rgba(17, 24, 39, 0.9);
            --panel-2: rgba(30, 41, 59, 0.84);
            --line: rgba(148, 163, 184, 0.18);
            --text: #e5eefc;
            --muted: #98abc8;
            --accent: #7dd3fc;
            --accent-2: #f59e0b;
            --success: #34d399;
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.42);
            --mono: "JetBrains Mono", "Cascadia Code", monospace;
            --sans: "Segoe UI", "Inter", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--sans);
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(125, 211, 252, 0.12), transparent 34%),
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.10), transparent 28%),
                linear-gradient(180deg, #07111f, #101827 55%, #0a1220);
        }

        .shell {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(10, 15, 26, 0.86);
            backdrop-filter: blur(18px);
            padding: 24px 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .brand h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.04em;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }
            100% { box-shadow: 0 0 0 12px rgba(52, 211, 153, 0); }
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .session-list {
            display: grid;
            gap: 10px;
        }

        .session-card {
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 14px 14px 12px;
            background: rgba(15, 23, 42, 0.68);
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .session-card:hover,
        .session-card.active {
            transform: translateY(-1px);
            border-color: rgba(125, 211, 252, 0.42);
            background: rgba(30, 41, 59, 0.88);
        }

        .session-card h2 {
            font-size: 13px;
            margin: 0 0 8px;
        }

        .session-card .meta {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .session-card p {
            margin: 0;
            color: #cfe0fb;
            font-size: 12px;
            line-height: 1.5;
        }

        .content {
            padding: 28px 32px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            gap: 18px;
        }

        .toolbar h2 {
            margin: 0;
            font-size: 22px;
        }

        .toolbar small {
            display: block;
            color: var(--muted);
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            border: 1px solid var(--line);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            border-radius: 999px;
            padding: 9px 14px;
            cursor: pointer;
            transition: border-color 0.18s ease, transform 0.18s ease;
        }

        button:hover {
            border-color: rgba(125, 211, 252, 0.45);
            transform: translateY(-1px);
        }

        .blocks {
            display: grid;
            gap: 16px;
        }

        .block {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .block-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.92), rgba(15, 23, 42, 0.92));
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .block-body {
            padding: 18px;
        }

        .block-body.markdown {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #edf4ff;
        }

        .block-body.code,
        .block-body.mermaid {
            font-family: var(--mono);
            white-space: pre-wrap;
            overflow-x: auto;
            color: #d8f3ff;
            background: rgba(2, 6, 23, 0.75);
            border-radius: 14px;
        }

        .block-body.mermaid {
            color: #fde68a;
        }

        .empty {
            display: grid;
            place-items: center;
            min-height: 60vh;
            border: 1px dashed rgba(125, 211, 252, 0.32);
            border-radius: 28px;
            color: var(--muted);
            background: rgba(15, 23, 42, 0.45);
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .content {
                padding: 22px 16px 28px;
            }

            .toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <h1>PawBot Canvas</h1>
                <div class="status"><span class="dot"></span><span id="statusText">Live</span></div>
            </div>
            <div class="hint">
                Rich responses land here as reusable output blocks. Code fences, diagrams, and plain notes are split automatically.
            </div>
            <div id="sessions" class="session-list"></div>
        </aside>
        <main class="content">
            <div class="toolbar">
                <div>
                    <h2 id="sessionTitle">Latest Session</h2>
                    <small id="sessionMeta">Waiting for canvas output…</small>
                </div>
                <div class="actions">
                    <button type="button" id="refreshBtn">Refresh</button>
                    <button type="button" id="clearBtn">Clear View</button>
                </div>
            </div>
            <div id="blocks" class="blocks">
                <div class="empty">No canvas sessions yet.</div>
            </div>
        </main>
    </div>

    <script>
        const sessionsEl = document.getElementById("sessions");
        const blocksEl = document.getElementById("blocks");
        const titleEl = document.getElementById("sessionTitle");
        const metaEl = document.getElementById("sessionMeta");
        const statusTextEl = document.getElementById("statusText");
        const refreshBtn = document.getElementById("refreshBtn");
        const clearBtn = document.getElementById("clearBtn");

        let activeSessionId = "latest";
        let latestSessions = [];

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;");
        }

        function relativeTime(seconds) {
            if (!seconds) return "just now";
            const age = Math.max(0, Math.floor(Date.now() / 1000 - seconds));
            if (age < 60) return `${age}s ago`;
            if (age < 3600) return `${Math.floor(age / 60)}m ago`;
            if (age < 86400) return `${Math.floor(age / 3600)}h ago`;
            return `${Math.floor(age / 86400)}d ago`;
        }

        function renderSessions(sessions) {
            latestSessions = sessions;
            if (!sessions.length) {
                sessionsEl.innerHTML = '<div class="session-card"><h2>No sessions</h2><p>Run the agent, chat via the gateway, or trigger a channel response to populate the canvas.</p></div>';
                return;
            }

            sessionsEl.innerHTML = sessions.map((session) => `
                <button class="session-card ${session.session_id === activeSessionId ? "active" : ""}" data-session="${escapeHtml(session.session_id)}">
                    <h2>${escapeHtml(session.title || session.session_id)}</h2>
                    <div class="meta">${escapeHtml(session.format || "markdown")} • ${escapeHtml(relativeTime(session.updated_at))}</div>
                    <p>${escapeHtml(session.preview || "")}</p>
                </button>
            `).join("");

            sessionsEl.querySelectorAll(".session-card").forEach((button) => {
                button.addEventListener("click", () => {
                    activeSessionId = button.dataset.session;
                    renderSessions(latestSessions);
                    loadRender(activeSessionId);
                });
            });
        }

        async function loadSessions() {
            const response = await fetch("/api/canvas/sessions");
            const payload = await response.json();
            renderSessions(payload.sessions || []);
            if (activeSessionId === "latest" && payload.sessions && payload.sessions[0]) {
                activeSessionId = payload.sessions[0].session_id;
            }
        }

        function blockMarkup(block) {
            const type = block.type || "markdown";
            const label = block.label || type;
            const content = escapeHtml(block.content || "");
            return `
                <section class="block">
                    <header class="block-head">
                        <span>${escapeHtml(label)}</span>
                        <button type="button" data-copy="${content.replaceAll('"', '&quot;')}">Copy</button>
                    </header>
                    <div class="block-body ${type}">${content}</div>
                </section>
            `;
        }

        function bindCopyButtons() {
            document.querySelectorAll("[data-copy]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const raw = button.getAttribute("data-copy")
                        .replaceAll("&quot;", '"')
                        .replaceAll("&lt;", "<")
                        .replaceAll("&gt;", ">")
                        .replaceAll("&amp;", "&");
                    await navigator.clipboard.writeText(raw);
                    const original = button.textContent;
                    button.textContent = "Copied";
                    setTimeout(() => {
                        button.textContent = original;
                    }, 1200);
                });
            });
        }

        async function loadRender(sessionId = "latest") {
            const url = new URL("/api/canvas/render", window.location.origin);
            url.searchParams.set("session_id", sessionId);
            const response = await fetch(url);
            if (!response.ok) {
                blocksEl.innerHTML = '<div class="empty">No renderable session found.</div>';
                titleEl.textContent = "Latest Session";
                metaEl.textContent = "Waiting for canvas output…";
                return;
            }

            const payload = await response.json();
            titleEl.textContent = payload.title || payload.session_id || "Canvas Session";
            metaEl.textContent = `${payload.format || "markdown"} • ${relativeTime(payload.updated_at)}`;
            blocksEl.innerHTML = (payload.blocks || []).map(blockMarkup).join("");
            bindCopyButtons();
        }

        function clearView() {
            blocksEl.innerHTML = '<div class="empty">Canvas view cleared. Select another session from the left to reopen it.</div>';
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const ws = new WebSocket(`${protocol}//${window.location.host}/canvas/ws`);

            ws.onopen = () => {
                statusTextEl.textContent = "Live";
                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send("ping");
                    }
                }, 15000);
            };

            ws.onmessage = async (event) => {
                const payload = JSON.parse(event.data);
                if (payload.type === "canvas_update" && payload.session) {
                    await loadSessions();
                    if (activeSessionId === "latest" || activeSessionId === payload.session.session_id) {
                        activeSessionId = payload.session.session_id;
                        await loadRender(activeSessionId);
                    }
                }
            };

            ws.onclose = () => {
                statusTextEl.textContent = "Offline";
                setTimeout(connectWebSocket, 2000);
            };
        }

        refreshBtn.addEventListener("click", async () => {
            await loadSessions();
            await loadRender(activeSessionId);
        });
        clearBtn.addEventListener("click", clearView);

        (async () => {
            await loadSessions();
            await loadRender(activeSessionId);
            connectWebSocket();
        })();
    </script>
</body>
</html>
