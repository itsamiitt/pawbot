name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile check
        run: python -m compileall pawbot
      - name: Unit tests
        run: pytest -q
      - name: Smoke CLI checks
        run: |
          pawbot --help
          pawbot status
          pawbot doctor || true
      - name: Secret scan
        run: python scripts/secret_scan.py
